<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Taboo Digital</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #0a0a0a;
      color: #00ff9c;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Courier New", monospace;
    }

    .frame {
      border: 4px solid #00ff9c;
      border-radius: 12px;
      padding: 30px;
      width: 90vw;
      height: 85vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      box-shadow: 0 0 20px #00ff9c33;
    }

    #timer {
      position: absolute;
      top: 15px;
      right: 25px;
      font-size: 2vw;
    }

    #main-word {
      font-size: 6vw;
      text-align: center;
      letter-spacing: 0.1em;
      margin-top: 40px;
    }

    .forbidden {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 40px;
      font-size: 2.2vw;
      text-align: center;
    }

    .forbidden div {
      border: 1px solid #00ff9c;
      padding: 12px;
      border-radius: 6px;
    }

    .scanline {
      position: absolute;
      width: 100%;
      height: 2px;
      background: rgba(0,255,156,0.15);
      top: 0;
      animation: scan 4s linear infinite;
    }

    @keyframes scan {
      0% { top: 0; }
      100% { top: 100%; }
    }
  </style>
</head>
<body>

<div class="frame">
  <div class="scanline"></div>
  <div id="timer">30</div>

  <div id="main-word"></div>

  <div class="forbidden" id="forbidden-list"></div>
</div>

<script>
  const cards = [
    {
      word: "ELECRICIDAD",
      forbidden: ["ENERGIA", "CORRIENTE", "CABLE", "ENCHUFE", "LUZ", "PODER"]
    },
    {
      word: "COMPUTADORA",
      forbidden: ["MAQUINA", "DISPOSITIVO", "PANTALLA", "INTERNET", "MOUSE", "TECLADO"]
    },
    {
      word: "INTERNET",
      forbidden: ["RED", "WEB", "CONEXION", "WIFI", "ONLINE", "NAVEGAR"]
    },
    {
      word: "AUTOMATIZACION",
      forbidden: ["PROCESO", "HUMANO", "INTERVENCION", "EFICIENCIA", "INDUSTRIA", "CONTROL"]
    },
    {
      word: "MICROCHIP",
      forbidden: ["CIRCUITO", "PEQUEÑO", "COMPONENTE", "PROCESADOR", "MEMORIA", "RAM"]
    },
    {
      word: "SOFTWARE",
      forbidden: ["CODIGO", "PROGRAMA", "DIGITAL", "COMPUTADORA", "ALGORITMO", "INSTRUCCIONES"]
    },
    {
      word: "TELECOMUNICACIONES",
      forbidden: ["COMUNICACION", "DISTANCIA", "TELEFONO", "RED", "DATOS", "MENSAJES"]
    },
    {
      word: "SATELITE",
      forbidden: ["ORBITA", "PLANETA", "CIELO", "GPS", "ARTIFICIAL", "SEÑAL"]
    },
    {
      word: "DIGITAL",
      forbidden: ["NUMEROS", "DATOS", "BITS", "TECNOLOGIA", "ELECTRONICO", "CODIGO"]
    },
    {
      word: "ENERGIA RENOVABLE",
      forbidden: ["LIMPIA", "SOLAR", "EOLICA", "NUCLEAR", "GEOTERMICA", "PETROLEO"]
    },
    {
      word: "TRANSISTOR",
      forbidden: ["CIRCUITO", "RADIO", "COMPONENTE", "INTERRUPTOR", "CHIP", "CORRIENTE"]
    },
    {
      word: "GLOBALIZACION",
      forbidden: ["MUNDO", "COMERCIO", "INTERNACIONAL", "ECONOMIA", "INTERCAMBIO", "FRONTERAS"]
    },
    {
      word: "AUTOMOVIL ELECTRICO",
      forbidden: ["COCHE", "VEHICULO", "BATERIA", "GASOLINA", "ENERGIA", "RUEDAS"]
    }
  ];

  let index = 0;
  let timeLeft = 30;
  let interval;

  const mainWordDiv = document.getElementById("main-word");
  const forbiddenDiv = document.getElementById("forbidden-list");
  const timerDiv = document.getElementById("timer");

  function showCard() {
    const card = cards[index];

    mainWordDiv.textContent = card.word;

    forbiddenDiv.innerHTML = "";
    card.forbidden.forEach(word => {
      const div = document.createElement("div");
      div.textContent = word;
      forbiddenDiv.appendChild(div);
    });

    resetTimer();
  }

  function resetTimer() {
    clearInterval(interval);
    timeLeft = 30;
    timerDiv.textContent = timeLeft;

    interval = setInterval(() => {
      timeLeft--;
      timerDiv.textContent = timeLeft;

      if (timeLeft <= 0) {
        clearInterval(interval);
      }
    }, 1000);
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight" || e.key === "ArrowDown") {
      index = (index + 1) % cards.length;
      showCard();
    } else if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
      index = (index - 1 + cards.length) % cards.length;
      showCard();
    }
  });

  showCard();
</script>

</body>
</html>
